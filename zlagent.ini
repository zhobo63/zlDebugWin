[agent]
auto_detect_language = true
language = multi
max_iterations = 10
prompt_file = 
user_reply_mode = off

[features]
max_reflection_retries = 2
multi_agent = false
self_reflection = true
task_planning = true

[llm]
max_tokens = 8192
model = qwopus3.6-27b-v2-mtp
temperature = 0.200000
url = http://127.0.0.1:1234

[local_tools]
enabled = true

[logging]
level = info

[memory]
auto_extract_facts = true
inject_facts_to_prompt = true
long_term_enabled = false
max_messages = 50
max_sessions = 100
store_dir = .zlagent_memory

[plugins]
directory = plugins

[rag]
embedding_backend = tfidf
embedding_mode = text-embedding-3-small
enabled = false
min_score = 0.300000
store_path = knowledge_base.json
top_k = 5

[safety]
dangerous_tool_confirmation = true
input_filter = true
skill_content_check = true
